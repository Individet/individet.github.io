name: Auto-merge article PRs

on:
  schedule:
    - cron: '0 8 * * *' # Kjør daglig kl. 08:00
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Merge stale article PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-merge'
            });

            const now = new Date();
            const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

            for (const pr of prs) {
              const age = now - new Date(pr.created_at);
              if (age >= SEVEN_DAYS_MS) {
                console.log(`Merger PR #${pr.number}: ${pr.title}`);
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `artikkel: ${pr.title}`
                });
              } else {
                const daysLeft = Math.ceil((SEVEN_DAYS_MS - age) / (24 * 60 * 60 * 1000));
                console.log(`PR #${pr.number} har ${daysLeft} dager igjen`);
              }
            }
