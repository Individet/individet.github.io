name: Forslag til ny aktør
description: Foreslå en aktør du ønsker analysert i Individets Suverenitetsindex
title: "[Forslag] "
labels: ["forslag"]
body:
  - type: input
    id: aktør
    attributes:
      label: Navn på aktør
      placeholder: f.eks. Rødt, Civita, Jonas Gahr Støre
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type aktør
      options:
        - Politiker
        - Parti
        - Organisasjon
        - Tenketank / kommentator
        - Mediehus
    validations:
      required: true

  - type: textarea
    id: begrunnelse
    attributes:
      label: Hvorfor bør denne aktøren analyseres?
      placeholder: Kort begrunnelse...

  - type: checkboxes
    id: bekreftelse
    attributes:
      label: Bekreftelse
      options:
        - label: Jeg har sjekket at aktøren ikke allerede er analysert på individet.no
          required: true
